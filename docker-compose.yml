version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sell2rent_db
    environment:
      POSTGRES_USER: sell2rent
      POSTGRES_PASSWORD: sell2rent_pass
      POSTGRES_DB: sell2rent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sell2rent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
